<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قائمة المصادر و المراجع</title>

<style>
@font-face{
  font-family: "AmiriLocal";
  src: url("fonts/Amiri-Regular.woff2") format("woff2");
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face{
  font-family: "AmiriLocal";
  src: url("fonts/Amiri-Bold.woff2") format("woff2");
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:Tahoma, Arial;
  background:linear-gradient(135deg,#eef7ff,#ffffff,#eafaf1);
  min-height:100vh;
  padding:14px 12px 0;
}

.amiri{
  font-family:"AmiriLocal", serif;
  font-weight:700;
}

/* ================= Header ================= */
.header{
  background:#ffffffcc;
  backdrop-filter:blur(10px);
  padding:18px 20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.10);
  border-radius:20px;
  display:grid;
  grid-template-columns: 1fr auto 1fr;
  align-items:center;
}

.header .welcome{
  grid-column:1;
  justify-self:start;
  color:#1b7f5f;
  font-size:18px;
}

.header h1{
  grid-column:2;
  justify-self:center;
  margin:0;
  color:#1b7f5f;
  font-size:30px;
  line-height:1.1;
}

.header .spacer{ grid-column:3; }

/* ================= Notice ================= */
.notice{
  margin:16px 0 10px;
  padding:14px;
  background:#dceeff;
  border-radius:15px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
  direction:ltr;
}

.notice-text{
  flex:1;
  text-align:center;
  direction:rtl;
}

/* ================= Layout ================= */
.viewer-wrapper{
  display:grid;
  grid-template-columns: 1fr 3fr;
  gap:18px;
  padding:12px 0 0;
}

/* ================= Index ================= */
.index-panel{
  border-radius:28px;
  padding:14px;
  color:white;
  background:radial-gradient(circle at 20% 20%, #222 0%, #111 40%, #000 100%);
  box-shadow:
    inset 0 0 40px rgba(255,255,255,0.05),
    0 30px 60px rgba(0,0,0,0.6);
  height: clamp(520px, 70vh, 760px);
  display:flex;
  flex-direction:column;
  gap:10px;
}

.index-title{
  text-align:center;
  font-size:20px;
  padding:10px 12px;
  border-radius:16px;
  background:rgba(255,255,255,0.06);
}

.index-list{
  flex:1;
  overflow:auto;
  padding:6px;
  border-radius:18px;
  background:rgba(255,255,255,0.03);
}

.index-list ul{
  list-style:none;
  padding:0;
  margin:0;
}

.index-list li{
  padding:10px;
  border-radius:12px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.index-list li.active{
  background: rgba(0, 200, 255, 0.22);
}

/* ================= Viewer ================= */
.viewer{
  border-radius:28px;
  overflow:hidden;
  background:#2b2b2b;
}

.controls{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  padding:10px 12px;
  background:#ffffff;
}

.controls button{
  padding:7px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.controls input{
  padding:7px 10px;
  border-radius:10px;
  border:1px solid #ccc;
  width:160px;
}

.pdf-wrap{ padding:14px; }

iframe{
  width:100%;
  height: clamp(420px, 65vh, 680px);
  border:none;
  border-radius:18px;
  background:#fff;
}

/* ================= Responsive ================= */
@media (max-width: 900px){
  .viewer-wrapper{ grid-template-columns: 1fr; }
  .index-panel{ height:320px; }
}

@media (max-width: 520px){
  body{ padding:10px; }

  .header h1{ font-size:20px; }
  .header .welcome{ font-size:14px; }

  .index-panel{ height:260px; padding:10px; }
  .index-title{ font-size:16px; }

  .index-list li{ font-size:14px; padding:8px; }

  .controls button{ font-size:13px; padding:6px 8px; }
  .controls input{ width:120px; }

  iframe{ height:55vh; }
}
</style>
</head>

<body>

<div class="header">
  <div class="welcome amiri">مرحبا بك</div>
  <h1 class="amiri">قائمة المصادر و المراجع</h1>
  <div class="spacer"></div>
</div>

<div class="viewer-wrapper">

<div class="index-panel">
<div class="index-title amiri">فهرس</div>
<div class="index-list">
<ul class="amiri">
<li onclick="goFromIndex(458)">المصادر القانونية و التشريعية <small>458</small></li>
<li onclick="goFromIndex(461)">المراجع العلمية باللغة العربية <small>461</small></li>
<li onclick="goFromIndex(461)">المراجع العلمية بالفرنسية و الإنجليزية <small>461</small></li>
<li onclick="goFromIndex(462)">المواقع الدولية <small>462</small></li>
<li onclick="goFromIndex(462)">القواميس و المعاجم <small>462</small></li>
</ul>
</div>
</div>

<div class="viewer-container">
<div class="viewer">
<div class="controls">
<div>
<input type="number" id="searchPage" placeholder="رقم الصفحة">
<button onclick="goToPage()">بحث</button>
</div>
<div>
<button onclick="prevPage()">السابق</button>
<button onclick="nextPage()">التالي</button>
</div>
<div>
صفحة <span id="currentPage">458</span>
</div>
</div>

<div class="pdf-wrap">
<iframe id="pdfFrame" src="pdfjs/web/viewer.html?file=../../source.pdf#page=458"></iframe>
</div>
</div>
</div>

</div>

<script>
const PDF_FILE = "source.pdf";
const START_PAGE = 458;
const END_PAGE = 462;

let currentPage = START_PAGE;
const pdfFrame = document.getElementById("pdfFrame");
const searchInput = document.getElementById("searchPage");
const currentPageEl = document.getElementById("currentPage");

function clampPage(p){
  return Math.max(START_PAGE, Math.min(END_PAGE, p));
}

function loadPdfPage(page){
  pdfFrame.src = `pdfjs/web/viewer.html?file=../../source.pdf#page=${page}`;
}

function updatePage(){
  loadPdfPage(currentPage);
  currentPageEl.textContent = currentPage;
}

function goFromIndex(page){
  currentPage = clampPage(page);
  updatePage();
}

function goToPage(){
  const page = Number(searchInput.value);
  if(!page) return;
  currentPage = clampPage(page);
  updatePage();
}

function nextPage(){
  if(currentPage < END_PAGE){
    currentPage++;
    updatePage();
  }
}

function prevPage(){
  if(currentPage > START_PAGE){
    currentPage--;
    updatePage();
  }
}

updatePage();
</script>

</body>
</html>
