<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>قاموس مصطلحات الصناعة الصيدلانية</title>

  <!-- خط Amiri -->
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box;margin:0;padding:0}

    :root{
      --green:#2f855a;
      --bg1:#f3fbff;
      --bg2:#f5fff7;
      --bg3:#fff8f2;
      --dark:#3f3f3f;
      --dark2:#1b1b1b;
    }

    body{
      font-family:"Amiri",serif;
      background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
      color:#111;
      padding:18px 14px 22px;
    }

    /* ===== Top bar ===== */
    .topbar{
      position:relative;
      width:min(1100px, 96vw);
      margin:0 auto 14px;
      padding:12px 14px;
      border-radius:18px;
      background:linear-gradient(180deg,#ffffff 0%, #f7fffb 100%);
      box-shadow:
        0 16px 34px rgba(0,0,0,.14),
        inset 2px 2px 10px rgba(255,255,255,.8),
        inset -2px -2px 10px rgba(0,0,0,.06);
      border:2px solid rgba(47,133,90,.25);
    }

    .welcome{
      position:absolute;
      top:10px;
      right:14px;
      color:var(--green);
      font-weight:700;
      font-size:18px;
      text-shadow:2px 2px 10px rgba(0,0,0,.10);
      white-space:nowrap;
    }

    .title{
      text-align:center;
      color:var(--green);
      font-weight:700;
      font-size:36px;
      line-height:1.2;
      text-shadow:2px 2px 12px rgba(0,0,0,.14);
      padding:4px 0 2px;
    }

    /* ===== Search row ===== */
    .search-wrap{
      width:min(1100px, 96vw);
      margin:0 auto 10px;
      display:flex;
      justify-content:center;
    }

    .search{
      width:min(720px, 92vw);
      border:none;
      outline:none;
      padding:12px 16px;
      border-radius:16px;
      font-size:18px;
      box-shadow:
        0 14px 30px rgba(0,0,0,.16),
        inset 2px 2px 10px rgba(255,255,255,.75),
        inset -2px -2px 12px rgba(0,0,0,.08);
    }

    /* ===== Tip banner ===== */
    .tip{
      width:min(1100px, 96vw);
      margin:0 auto 14px;
      padding:10px 12px;
      border-radius:14px;
      text-align:center;
      background:linear-gradient(180deg,#e6f4ff 0%, #f1fbff 100%);
      box-shadow:
        0 12px 26px rgba(0,0,0,.12),
        inset 2px 2px 10px rgba(255,255,255,.75),
        inset -2px -2px 12px rgba(0,0,0,.06);
      border:1px solid rgba(0,0,0,.06);
      font-size:17px;
      line-height:1.6;
    }

    /* ===== Layout ===== */
    .layout{
      width:min(1100px, 96vw);
      margin:0 auto;
      display:flex;
      gap:14px;
      align-items:stretch;
    }

    /* Right: results */
    .right{
      flex:1;
      min-width:0;
    }

    /* Left: viewer */
    .left{
      width:44%;
      min-width:320px;
      display:flex;
      gap:10px;
      align-items:stretch;
    }

    .side-buttons{
      display:flex;
      flex-direction:column;
      gap:12px;
      padding-top:8px;
    }

    /* Buttons like phone side: thin + dark */
    .side-buttons button{
      width:28px;
      height:66px;
      border:none;
      border-radius:14px;
      cursor:pointer;
      background:linear-gradient(145deg,var(--dark2), #4a4a4a);
      color:#fff;
      box-shadow:
        0 12px 26px rgba(0,0,0,.42),
        inset 2px 2px 8px rgba(255,255,255,.08),
        inset -2px -2px 10px rgba(0,0,0,.62);
      transition:transform .15s ease, filter .15s ease;
      user-select:none;
      font-size:18px;
      font-weight:700;
      line-height:1;
    }

    .side-buttons button:hover{transform:translateY(-2px); filter:brightness(1.05);}
    .side-buttons button:active{transform:translateY(0); filter:brightness(.98);}

    .viewer-shell{
      flex:1;
      background:var(--dark);
      border-radius:18px;
      overflow:hidden;
      box-shadow:
        0 18px 40px rgba(0,0,0,.35),
        inset 2px 2px 10px rgba(255,255,255,.08),
        inset -2px -2px 14px rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.06);
    }

    .viewer-shell iframe{
      width:100%;
      height:720px;
      border:none;
      display:block;
      background:transparent;
    }

    /* ===== Voice selectors ===== */
    .voices{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin:0 0 12px;
    }

    .voice-group{
      background:linear-gradient(180deg,#ffffff 0%, #f7fffb 100%);
      border-radius:14px;
      padding:8px 10px;
      box-shadow:
        0 12px 26px rgba(0,0,0,.12),
        inset 2px 2px 10px rgba(255,255,255,.75),
        inset -2px -2px 12px rgba(0,0,0,.06);
      border:1px solid rgba(0,0,0,.06);
      display:flex;
      gap:8px;
      align-items:center;
    }

    .voice-group label{
      color:#0f766e;
      font-weight:700;
      font-size:15px;
      white-space:nowrap;
    }

    .voice-group select{
      border:none;
      outline:none;
      background:transparent;
      font-family:"Amiri",serif;
      font-size:15px;
      min-width:190px;
    }

    /* ===== Cards ===== */
    .card{
      background:linear-gradient(180deg,#ffffff 0%, #fbfffd 100%);
      border-radius:18px;
      padding:12px 12px 10px;
      margin-bottom:12px;
      box-shadow:
        0 16px 34px rgba(0,0,0,.16),
        inset 2px 2px 10px rgba(255,255,255,.85),
        inset -2px -2px 12px rgba(0,0,0,.07);
      border:1px solid rgba(0,0,0,.05);
      cursor:pointer;
      transition:transform .15s ease, filter .15s ease;
    }

    .card:hover{transform:translateY(-3px); filter:brightness(1.01);}

    .line{
      position:relative;
      padding-right:30px; /* space for 🔊 on the right */
      margin:6px 0;
      line-height:1.6;
      font-size:18px;
    }

    .line strong{font-weight:700;}

    .speaker{
      position:absolute;
      right:0;
      top:0;
      width:26px;
      height:26px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:10px;
      background:linear-gradient(145deg,#e9f8ff,#e8fff4);
      box-shadow:
        0 10px 18px rgba(0,0,0,.12),
        inset 2px 2px 8px rgba(255,255,255,.75),
        inset -2px -2px 10px rgba(0,0,0,.08);
      user-select:none;
      cursor:pointer;
    }

    .speaker:active{filter:brightness(.98);}

    .ltr{direction:ltr; text-align:left;}
    .rtl{direction:rtl; text-align:right;}

    .meta{
      margin-top:8px;
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .badge{
      font-size:13px;
      padding:3px 8px;
      border-radius:10px;
      background:linear-gradient(145deg,#ffdede,#fff1f1);
      box-shadow:
        0 10px 18px rgba(0,0,0,.10),
        inset 2px 2px 8px rgba(255,255,255,.75),
        inset -2px -2px 10px rgba(0,0,0,.07);
      border:1px solid rgba(0,0,0,.04);
    }

    .empty{
      margin-top:10px;
      text-align:center;
      opacity:.75;
      font-size:16px;
    }

    /* ===== Bottom ===== */
    .footer{
      width:min(1100px, 96vw);
      margin:16px auto 0;
      display:flex;
      justify-content:center;
    }

    .back-btn{
      border:none;
      cursor:pointer;
      padding:10px 18px;
      border-radius:14px;
      font-family:"Amiri",serif;
      font-weight:700;
      font-size:18px;
      background:linear-gradient(145deg,#c9f0ff,#d4f5e1);
      box-shadow:
        0 16px 34px rgba(0,0,0,.18),
        inset 2px 2px 10px rgba(255,255,255,.75),
        inset -2px -2px 12px rgba(0,0,0,.10);
    }

    .back-btn:active{filter:brightness(.98);}

  /* ===== Mobile: tabs ===== */
.tabs{
  width:min(1100px, 96vw);
  margin:0 auto 10px;
  display:none;
  gap:10px;
  justify-content:center;
}

.tab-btn{
  border:none;
  cursor:pointer;
  padding:9px 14px;
  border-radius:14px;
  font-family:"Amiri",serif;
  font-weight:700;
  font-size:16px;
  background:linear-gradient(145deg,#c9f0ff,#d4f5e1);
  box-shadow:
    0 12px 26px rgba(0,0,0,.14),
    inset 2px 2px 10px rgba(255,255,255,.75),
    inset -2px -2px 12px rgba(0,0,0,.10);
  min-width:110px;
  transition:all .2s ease;
}

.tab-btn.active{
  outline:2px solid rgba(47,133,90,.35);
}

/* =====================================
   Tablet & Mobile Layout (أقل من 940px)
===================================== */
@media (max-width: 940px){

  .layout{
    flex-direction:column;
  }

  .left{
    width:100%;
    min-width:0;
    display:none;
  }

  .left.show{
    display:flex;
  }

  .right.hide{
    display:none;
  }

  .viewer-shell iframe{
    height:65vh;
  }

  .tabs{
    display:flex;
  }

  .welcome{
    position:static;
    text-align:right;
    padding-bottom:6px;
  }

  .title{
    font-size:28px;
  }

}

/* =====================================
   Small Phones (أقل من 600px)
===================================== */
@media (max-width: 600px){

  body{
    padding:12px 8px 18px;
  }

  .title{
    font-size:22px;
  }

  .search{
    font-size:16px;
    padding:10px 12px;
  }

  .tip{
    font-size:14px;
    padding:8px 10px;
  }

  .tab-btn{
    font-size:14px;
    padding:7px 10px;
    min-width:90px;
  }

  .viewer-shell iframe{
    height:60vh;
  }

  .side-buttons button{
    width:24px;
    height:52px;
    font-size:14px;
  }

}
  </style>
</head>

<body>
  <header class="topbar">
    <div class="welcome">مرحبا بك ..</div>
    <div class="title">قاموس مصطلحات الصّناعة الصيدلانيّة</div>
  </header>

  <div class="search-wrap">
    <input id="searchInput" class="search" type="text" placeholder="اكتب للبحث..." />
  </div>

  <div class="tip">البحث يعتمد ثلاث لغات العربيّة و الانكليزيّة و الفرنسيّة و  عند الوصول لنتيجة  أنقر على الكرت ليظهر المصدر في العارض..</div>

  <!-- Tabs for mobile -->
  <div class="tabs">
    <button id="tabSearch" class="tab-btn active" type="button">البحث</button>
    <button id="tabSource" class="tab-btn" type="button">المصدر</button>
  </div>

  <main class="layout">
    <!-- RIGHT: results -->
    <section class="right" id="rightPanel">
      <div class="voices" id="voicesBar">
        <div class="voice-group">
          <label>FR</label>
          <select id="voiceFR"></select>
        </div>
        <div class="voice-group">
          <label>AR</label>
          <select id="voiceAR"></select>
        </div>
        <div class="voice-group">
          <label>EN</label>
          <select id="voiceEN"></select>
        </div>
      </div>

      <div id="results"></div>
      <div id="emptyState" class="empty">ابدأ الكتابة للبحث…</div>
    </section>

    <!-- LEFT: viewer -->
    <aside class="left" id="leftPanel">
      <div class="side-buttons">
        <button id="btnPrev" title="السابق">◀</button>
        <button id="btnNext" title="التالي">▶</button>
        <button id="btnZoomIn" title="تكبير">＋</button>
        <button id="btnZoomOut" title="تصغير">－</button>
      </div>

      <div class="viewer-shell">
        <iframe id="pdfViewer" src="pdfjs/web/viewer.html?file=../../source.pdf"></iframe>
      </div>
    </aside>
  </main>

  <footer class="footer">
  <button class="back-btn" type="button" onclick="location.href='index.html'">الرجوع إلى الصفحة الرئيسية</button>
</footer>

e"},{"id":34,"page":11,"fr":"Acétate alpha tocophérol","ar":"أسيتات ألفا توكوفيرول","en":"Alpha tocopherol acetate","kw_fr":"Acétate alpha tocophérol;acetate;acetate alpha tocopherol;alpha;tocopherol","kw_ar":"أسيتات ألفا توكوفيرول;اسيتات;اسيتات الفا توكوفيرول;الفا;توكوفيرول;فا","kw_en":"Alpha tocopherol acetate;acetate;alpha;alpha tocopherol acetate;tocopherol"},{"id":35,"page":11,"fr":"Acétate d'abiratérone","ar":"أسيتات أبيراتيرون","en":"Abiraterone acetate","kw_fr":"Acétate d'abiratérone;abiraterone;acetate;acetate d abiraterone","kw_ar":"أسيتات أبيراتيرون;ابيراتيرون;اسيتات;اسيتات ابيراتيرون","kw_en":"Abiraterone acetate;abiraterone;abiraterone acetate;acetate"},{"id":36,"page":11,"fr":"Acétate de flécainide","ar":"أسيتات فليكاينيد","en":"Flecainide acetate","kw_fr":"Acétate de flécainide;acetate;acetate de flecainide;de;flecainide","kw_ar":"أسيتات فليكاينيد;اسيتات;اسيتات فليكاينيد;فليكاينيد","kw_en":"Flecainide acetate;acetate;flecainide;flecainide acetate"},{"id":37,"page":12,"fr":"Acétate de nomégestrol","ar":"أسيتات نوميجيسترول","en":"Nomegestrol acetate","kw_fr":"Acétate de nomégestrol;acetate;acetate de nomegestrol;de;nomegestrol","kw_ar":"أسيتات نوميجيسترول;اسيتات;اسيتات نوميجيسترول;نوميجيسترول","kw_en":"Nomegestrol acetate;acetate;n    // ===== Search =====
    const input = document.getElementById("searchInput");
    const resultsEl = document.getElementById("results");
    const emptyEl = document.getElementById("emptyState");
    const pdfViewer = document.getElementById("pdfViewer");

    // ===== Tabs (mobile) =====
    const tabSearch = document.getElementById("tabSearch");
    const tabSource = document.getElementById("tabSource");
    const rightPanel = document.getElementById("rightPanel");
    const leftPanel = document.getElementById("leftPanel");

    function showTab(which){
      if (window.matchMedia("(max-width: 940px)").matches){
        if(which === "search"){
          rightPanel.classList.remove("hide");
          leftPanel.classList.remove("show");
          tabSearch.classList.add("active");
          tabSource.classList.remove("active");
        } else {
          rightPanel.classList.add("hide");
          leftPanel.classList.add("show");
          tabSource.classList.add("active");
          tabSearch.classList.remove("active");
        }
      }
    }

    tabSearch.addEventListener("click", () => showTab("search"));
    tabSource.addEventListener("click", () => showTab("source"));

    function isArabic(text){
      return /[\u0600-\u06FF]/.test(text);
    }

    // ===== Voice selection =====
    const voiceFR = document.getElementById("voiceFR");
    const voiceAR = document.getElementById("voiceAR");
    const voiceEN = document.getElementById("voiceEN");
    let voices = [];

    function fillVoices(){
      if (!window.speechSynthesis) return;
      voices = window.speechSynthesis.getVoices() || [];

      function fill(selectEl, langHints){
        selectEl.innerHTML = "";
        const opts = voices
          .map((v, idx) => ({ idx, v }))
          .filter(o => langHints.some(h => (o.v.lang || "").toLowerCase().startsWith(h)));
        const list = opts.length ? opts : voices.map((v, idx) => ({ idx, v }));
        list.slice(0, 200).forEach(o => {
          const opt = document.createElement("option");
          opt.value = String(o.idx);
          opt.textContent = `${o.v.name} (${o.v.lang})`;
          selectEl.appendChild(opt);
        });
      }

      fill(voiceFR, ["fr"]);
      fill(voiceAR, ["ar"]);
      fill(voiceEN, ["en"]);
    }

    if (window.speechSynthesis){
      fillVoices();
      window.speechSynthesis.onvoiceschanged = fillVoices;
    }

    function speak(text, lang, selectEl){
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = lang;

      const idx = Number(selectEl.value);
      if (voices[idx]) u.voice = voices[idx];

      window.speechSynthesis.speak(u);
    }

    // ===== PDF navigation =====
    let currentPage = null;
    let zoom = 1.0;

    function goToPage(page){
      if (!page) return;
      currentPage = Number(page);
      pdfViewer.src = "pdfjs/web/viewer.html?file=../../source.pdf#page=" + currentPage;

      // On mobile: show source tab automatically
      showTab("source");
    }

    document.getElementById("btnPrev").addEventListener("click", () => {
      if (!currentPage) return;
      currentPage = Math.max(1, currentPage - 1);
      pdfViewer.src = "pdfjs/web/viewer.html?file=../../source.pdf#page=" + currentPage;
      showTab("source");
    });

    document.getElementById("btnNext").addEventListener("click", () => {
      if (!currentPage) return;
      currentPage = currentPage + 1;
      pdfViewer.src = "pdfjs/web/viewer.html?file=../../source.pdf#page=" + currentPage;
      showTab("source");
    });

    document.getElementById("btnZoomIn").addEventListener("click", () => {
      zoom = Math.min(1.8, zoom + 0.1);
      pdfViewer.style.transformOrigin = "center center";
      pdfViewer.style.transform = "scale(" + zoom.toFixed(2) + ")";
      showTab("source");
    });

    document.getElementById("btnZoomOut").addEventListener("click", () => {
      zoom = Math.max(0.7, zoom - 0.1);
      pdfViewer.style.transformOrigin = "center center";
      pdfViewer.style.transform = "scale(" + zoom.toFixed(2) + ")";
      showTab("source");
    });

    // ===== Render cards =====
    function escapeHTML(s){
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function render(items){
      resultsEl.innerHTML = "";
      if (!items.length){
        emptyEl.style.display = "block";
        return;
      }
      emptyEl.style.display = "none";

      items.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.addEventListener("click", () => goToPage(item.page));

        const fr = item.fr || "";
        const ar = item.ar || "";
        const en = item.en || "";

        card.innerHTML = `
          <div class="line ltr">
            <span class="speaker" data-lang="fr" data-text="${escapeHTML(fr)}">🔊</span>
            <span><strong>${escapeHTML(fr)}</strong></span>
          </div>

          <div class="line rtl">
            <span class="speaker" data-lang="ar" data-text="${escapeHTML(ar)}">🔊</span>
            <span>${escapeHTML(ar)}</span>
          </div>

          <div class="line ltr">
            <span class="speaker" data-lang="en" data-text="${escapeHTML(en)}">🔊</span>
            <span>${escapeHTML(en)}</span>
          </div>

          <div class="meta">
            <span class="badge">ID: ${item.id}</span>
            <span class="badge">Page: ${item.page}</span>
          </div>
        `;

        // speaker clicks
        card.querySelectorAll(".speaker").forEach(sp => {
          sp.addEventListener("click", (e) => {
            e.stopPropagation();
            const lang = sp.getAttribute("data-lang");
            const text = sp.getAttribute("data-text") || "";
            if (lang === "fr") speak(text, "fr-FR", voiceFR);
            if (lang === "ar") speak(text, "ar", voiceAR);
            if (lang === "en") speak(text, "en-US", voiceEN);
          });
        });

        resultsEl.appendChild(card);
      });
    }

    // ===== Search handler =====
    input.addEventListener("input", function(){
      const q = this.value.trim();
      resultsEl.innerHTML = "";

      if (!q){
        emptyEl.style.display = "block";
        emptyEl.textContent = "ابدأ الكتابة للبحث…";
        return;
      }

      const arabic = isArabic(q);
      const minLen = arabic ? 2 : 3;

      if (q.length < minLen){
        emptyEl.style.display = "block";
        emptyEl.textContent = arabic ? "أدخل حرفين على الأقل…" : "أدخل 3 أحرف على الأقل…";
        return;
      }

      const qLat = arabic ? q : q.toLowerCase();
      const out = [];

      for (let i=0; i<data.length; i++){
        const it = data[i];
        const fr = (it.fr || "");
        const ar = (it.ar || "");
        const en = (it.en || "");
        const kfr = (it.kw_fr || "");
        const kar = (it.kw_ar || "");
        const ken = (it.kw_en || "");

        let ok = false;

        if (arabic){
          ok = ar.includes(q) || kar.includes(q);
        } else {
          ok =
            fr.toLowerCase().includes(qLat) ||
            en.toLowerCase().includes(qLat) ||
            kfr.toLowerCase().includes(qLat) ||
            ken.toLowerCase().includes(qLat);
        }

        // fallback: direct includes across all fields
        if (!ok){
          ok =
            fr.includes(q) || ar.includes(q) || en.includes(q) ||
            kfr.includes(q) || kar.includes(q) || ken.includes(q);
        }

        if (ok){
          out.push(it);
          if (out.length >= 10) break;
        }
      }

      render(out);
    });

    // Initial mobile state
    showTab("search");
  </script>
