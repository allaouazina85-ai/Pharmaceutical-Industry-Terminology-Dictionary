<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الملاحق</title>

<style>
@font-face{
  font-family: "AmiriLocal";
  src: url("fonts/Amiri-Regular.woff2") format("woff2");
  font-weight: 400;
}
@font-face{
  font-family: "AmiriLocal";
  src: url("fonts/Amiri-Bold.woff2") format("woff2");
  font-weight: 700;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:Tahoma, Arial;
  background:linear-gradient(135deg,#eef7ff,#ffffff,#eafaf1);
  min-height:100vh;
  padding:14px 12px 0;
}

.amiri{
  font-family:"AmiriLocal", serif;
  font-weight:700;
}

/* Header */
.header{
  background:#ffffffcc;
  backdrop-filter:blur(10px);
  padding:18px 20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.10);
  border-radius:20px;
  display:grid;
  grid-template-columns: 1fr auto 1fr;
  align-items:center;
}
.header .welcome{
  color:#1b7f5f;
  font-size:18px;
}
.header h1{
  margin:0;
  color:#1b7f5f;
  font-size:30px;
}

/* Layout */
.viewer-wrapper{
  display:grid;
  grid-template-columns: 1fr 3fr;
  gap:18px;
  padding:12px 0 0;
}

.index-panel{
  border-radius:28px;
  padding:14px;
  color:white;
  background:radial-gradient(circle at 20% 20%, #222 0%, #111 40%, #000 100%);
  box-shadow:0 30px 60px rgba(0,0,0,0.6);
  height: clamp(520px, 70vh, 760px);
  display:flex;
  flex-direction:column;
}

.index-list{
  flex:1;
  overflow:auto;
}

.index-list li{
  padding:10px;
  border-radius:12px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}
.index-list li.active{
  background: rgba(0, 200, 255, 0.22);
}

/* Viewer */
.viewer{
  border-radius:28px;
  overflow:hidden;
  background:radial-gradient(circle at 30% 15%, #5a5a5a 0%, #2b2b2b 40%, #1f1f1f 100%);
  box-shadow:0 30px 60px rgba(0,0,0,0.35);
}

.controls{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  padding:10px 12px;
  background:#ffffff;
}

.controls button{
  padding:7px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.controls input{
  padding:7px 10px;
  border-radius:10px;
  border:1px solid #ccc;
  width:160px;
}

.pdf-wrap{ padding:14px; }

iframe{
  width:100%;
  height: clamp(420px, 65vh, 680px);
  border:none;
  border-radius:18px;
  background:#fff;
}

/* Responsive */
@media (max-width:900px){
  .viewer-wrapper{ grid-template-columns:1fr; }
  .index-panel{ height:300px; }
}

@media (max-width:520px){

  body{ padding:10px; }

  .header h1{ font-size:20px; }
  .header .welcome{ font-size:14px; }

  .index-panel{
    height:240px;
    padding:10px;
  }

  .index-list li{
    font-size:14px;
    padding:8px;
  }

  .controls button{
    font-size:13px;
    padding:6px 8px;
  }

  .controls input{
    width:120px;
  }

  iframe{
    height:60vh;
    border-radius:14px;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="welcome amiri">مرحبا بك</div>
  <h1 class="amiri">الملاحق</h1>
</div>

<div class="viewer-wrapper">

  <div class="index-panel">
    <div class="index-list">
      <ul>
        <li onclick="goFromIndex(463)">بداية الملاحق <small>463</small></li>
        <li onclick="goFromIndex(470)">ملحق 2 <small>470</small></li>
        <li onclick="goFromIndex(480)">ملحق 3 <small>480</small></li>
        <li onclick="goFromIndex(499)">ملحق 4 <small>499</small></li>
      </ul>
    </div>
  </div>

  <div class="viewer-container">
    <div class="viewer">

      <div class="controls">
        <div>
          <input type="number" id="searchPage" placeholder="رقم الصفحة">
          <button onclick="goToPage()">بحث</button>
        </div>

        <div>
          <button onclick="prevPage()">السابق</button>
          <button onclick="nextPage()">التالي</button>
        </div>

        <div>
          صفحة <span id="currentPage">463</span>
        </div>
      </div>

      <div class="pdf-wrap">
        <!-- ✅ استخدام PDF.js -->
        <iframe id="pdfFrame"
          src="pdfjs/web/viewer.html?file=../../source.pdf#page=463">
        </iframe>
      </div>

    </div>
  </div>

</div>

<script>
const PDF_FILE = "source.pdf";
const START_PAGE = 463;
const END_PAGE = 507;

let currentPage = START_PAGE;
const pdfFrame = document.getElementById("pdfFrame");
const searchInput = document.getElementById("searchPage");
const currentPageEl = document.getElementById("currentPage");

function clampPage(p){
  return Math.max(START_PAGE, Math.min(END_PAGE, p));
}

/* ✅ تحميل مباشر عبر PDF.js بدون about:blank */
function loadPdfPage(page){
  pdfFrame.src =
    `pdfjs/web/viewer.html?file=../../${PDF_FILE}#page=${page}`;
}

function updatePage(){
  loadPdfPage(currentPage);
  currentPageEl.textContent = currentPage;
}

function goFromIndex(page){
  currentPage = clampPage(page);
  updatePage();
}

function goToPage(){
  const page = Number(searchInput.value);
  if(!page) return;
  currentPage = clampPage(page);
  updatePage();
}

function nextPage(){
  if(currentPage < END_PAGE){
    currentPage++;
    updatePage();
  }
}

function prevPage(){
  if(currentPage > START_PAGE){
    currentPage--;
    updatePage();
  }
}

updatePage();
</script>

</body>
</html>
