<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الملاحق</title>

<style>
@font-face{
  font-family: "AmiriLocal";
  src: url("fonts/Amiri-Regular.woff2") format("woff2");
  font-weight: 400;
}
@font-face{
  font-family: "AmiriLocal";
  src: url("fonts/Amiri-Bold.woff2") format("woff2");
  font-weight: 700;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  font-family:Tahoma, Arial;
  background:linear-gradient(135deg,#eef7ff,#ffffff,#eafaf1);
  min-height:100vh;
  padding:14px 12px 0;
}

.amiri{
  font-family:"AmiriLocal", serif;
  font-weight:700;
}

/* Header */
.header{
  background:#ffffffcc;
  backdrop-filter:blur(10px);
  padding:18px 20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.10);
  border-radius:20px;
  display:grid;
  grid-template-columns: 1fr auto 1fr;
  align-items:center;
}

.header .welcome{
  grid-column:1;
  justify-self:start;
  color:#1b7f5f;
  font-size:18px;
}

.header h1{
  grid-column:2;
  justify-self:center;
  margin:0;
  color:#1b7f5f;
  font-size:30px;
  line-height:1.1;
}

.header .spacer{ grid-column:3; }

/* Layout */
.viewer-wrapper{
  display:grid;
  grid-template-columns: 1fr 3fr;
  gap:18px;
  padding:12px 0 0;
  align-items:stretch;
}

/* Index */
.index-panel{
  border-radius:28px;
  padding:14px;
  color:white;
  background:radial-gradient(circle at 20% 20%, #222 0%, #111 40%, #000 100%);
  box-shadow:
    inset 0 0 40px rgba(255,255,255,0.05),
    0 30px 60px rgba(0,0,0,0.6);
  height: clamp(520px, 70vh, 760px);
  display:flex;
  flex-direction:column;
  gap:10px;
}

.index-list{
  flex:1;
  overflow:auto;
}

.index-list li{
  padding:10px;
  border-radius:12px;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.index-list li.active{
  background: rgba(0, 200, 255, 0.22);
}

/* Viewer */
.viewer{
  border-radius:28px;
  overflow:hidden;
  background:radial-gradient(circle at 30% 15%, #5a5a5a 0%, #2b2b2b 40%, #1f1f1f 100%);
  box-shadow:0 30px 60px rgba(0,0,0,0.35);
}

.controls{
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
  padding:10px 12px;
  background:rgba(255,255,255,0.90);
}

.controls button{
  padding:7px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#fff;
  box-shadow:0 4px 10px rgba(0,0,0,0.10);
}

.controls input{
  padding:7px 10px;
  border-radius:10px;
  border:1px solid #ccc;
  width:160px;
}

.pdf-wrap{ padding:14px; }

iframe{
  width:100%;
  height: clamp(420px, 65vh, 680px);
  border:none;
  border-radius:18px;
  background:#fff;
}

/* Responsive */
@media (max-width: 900px){
  .viewer-wrapper{ grid-template-columns:1fr; }
  .index-panel{ height:300px; }
}

@media (max-width: 520px){

  body{ padding:10px 10px 0; }

  .header{
    padding:14px 14px;
    grid-template-columns: 1fr auto;
    row-gap:6px;
  }

  .header .welcome{ font-size:16px; }
  .header h1{ font-size:24px; }
  .header .spacer{ display:none; }

  .controls input{ width:140px; }

  /* تحسين العارض للهاتف فقط */
  .viewer{ border-radius:22px; }
  iframe{
    height:60vh;
    border-radius:14px;
  }
  .controls button{
    font-size:13px;
    padding:6px 8px;
  }
  .index-panel{
    height:260px;
  }
}
</style>
</head>

<body>

<div class="header">
  <div class="welcome amiri">مرحبا بك</div>
  <h1 class="amiri">الملاحق</h1>
  <div class="spacer"></div>
</div>

<div class="viewer-wrapper">

  <div class="index-panel">
    <div class="index-list">
      <ul>
        <li onclick="goFromIndex(463)">بداية الملاحق <small>463</small></li>
      </ul>
    </div>
  </div>

  <div class="viewer-container">
    <div class="viewer">

      <div class="controls">
        <div>
          <input type="number" id="searchPage" placeholder="رقم الصفحة (463 - 507)">
          <button onclick="goToPage()">بحث</button>
        </div>

        <div>
          <button onclick="downloadPDF()">تحميل</button>
          <button onclick="printPDF()">طباعة</button>
          <button onclick="rotatePDF()">تدوير</button>
          <button onclick="prevPage()">السابق</button>
          <button onclick="nextPage()">التالي</button>
        </div>

        <div>
          صفحة <span id="currentPage">463</span> / <span id="endPage">507</span>
        </div>
      </div>

      <div class="pdf-wrap">
        <!-- ✅ تم التعديل لاستخدام PDF.js -->
        <iframe id="pdfFrame"
          src="pdfjs/web/viewer.html?file=../../source.pdf#page=463">
        </iframe>
      </div>

    </div>
  </div>

</div>

<script>
const PDF_FILE  = "source.pdf";
const START_PAGE = 463;
const END_PAGE   = 507;

let currentPage = START_PAGE;
let rotation = 0;

const pdfFrame = document.getElementById("pdfFrame");
const searchInput = document.getElementById("searchPage");
const currentPageEl = document.getElementById("currentPage");
const endPageEl = document.getElementById("endPage");

endPageEl.textContent = END_PAGE;
searchInput.min = START_PAGE;
searchInput.max = END_PAGE;

function clampPage(page){
  if (page < START_PAGE) return START_PAGE;
  if (page > END_PAGE) return END_PAGE;
  return page;
}

/* ✅ تحميل مباشر عبر PDF.js بدون about:blank */
function loadPdfPage(page){
  pdfFrame.src =
    "pdfjs/web/viewer.html?file=../../" +
    PDF_FILE +
    "#page=" + page;
}

function updatePage(){
  loadPdfPage(currentPage);
  currentPageEl.textContent = currentPage;
}

function goFromIndex(page){
  currentPage = clampPage(Number(page));
  updatePage();
}

function goToPage(){
  const page = Number(searchInput.value);
  if (!page || page < START_PAGE || page > END_PAGE){
    alert("الرجاء إدخال رقم بين " + START_PAGE + " و " + END_PAGE);
    return;
  }
  currentPage = page;
  updatePage();
}

function nextPage(){
  if (currentPage < END_PAGE){
    currentPage++;
    updatePage();
  }
}

function prevPage(){
  if (currentPage > START_PAGE){
    currentPage--;
    updatePage();
  }
}

function downloadPDF(){
  window.open(PDF_FILE);
}

function printPDF(){
  pdfFrame.contentWindow.focus();
  pdfFrame.contentWindow.print();
}

function rotatePDF(){
  rotation += 90;
  pdfFrame.style.transform = "rotate(" + rotation + "deg)";
}

updatePage();
</script>

</body>
</html>
