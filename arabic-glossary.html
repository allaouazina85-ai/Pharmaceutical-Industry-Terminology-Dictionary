<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المسرد العربي</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:"Amiri",serif;
  background:linear-gradient(135deg,#f3fbff,#f5fff7,#fff8f2);
  padding:20px;
  overflow-x:hidden;
}

/* ===== Title ===== */
.topbar{
  position:relative;
  background:white;
  padding:18px 15px;
  border-radius:20px;
  text-align:center;
  font-size:34px;
  font-weight:bold;
  color:#2f855a;
  box-shadow:0 15px 35px rgba(0,0,0,.15);
  margin-bottom:15px;
}

.welcome{
  position:absolute;
  top:12px;
  right:18px;
  font-size:18px;
  color:#2f855a;
  font-weight:700;
}

/* ===== Alphabet ===== */
.alphabet{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:6px;
  margin-bottom:15px;
}

.alphabet button{
  border:none;
  padding:8px 14px;
  border-radius:30px;
  font-size:18px;
  cursor:pointer;
  background:linear-gradient(145deg,#ffffff,#e8fff4);
  box-shadow:0 8px 15px rgba(0,0,0,.15);
  transition:.2s;
}

.alphabet button.active{
  background:#2f855a;
  color:white;
}

/* ===== Tip ===== */
.tip{
  text-align:center;
  background:#e6f4ff;
  padding:10px;
  border-radius:15px;
  margin-bottom:18px;
}

/* ===== Viewer ===== */
.viewer-container{
  position:relative;
  background:#3f3f3f;
  border-radius:20px;
  padding:12px;
  box-shadow:0 20px 40px rgba(0,0,0,.4);
  max-width:1200px;
  margin:auto;
}

/* Toolbar */
.toolbar{
  background:white;
  padding:6px;
  border-radius:12px;
  margin-bottom:10px;
  display:flex;
  justify-content:center;
  gap:10px;
  align-items:center;
}

.toolbar button{
  border:none;
  padding:5px 12px;
  border-radius:10px;
  cursor:pointer;
}

.book{
  display:flex;
  justify-content:center;
  overflow:hidden;
  align-items:flex-start;
}

/* ✅ صفحة واحدة واضحة */
.pdf-page{
  width: 100%;
  height: clamp(520px, 72vh, 780px);
  border:none;
  border-radius:12px;
  background:#fff;
  box-shadow:0 10px 20px rgba(0,0,0,.3);
}

/* Side Buttons */
.side-right, .side-left{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  display:flex;
  flex-direction:column;
  gap:12px;
}

.side-right{ right:-30px; }
.side-left{ left:-30px; }

.side-right button,
.side-left button{
  width:26px;
  height:65px;
  border:none;
  border-radius:15px;
  background:#1b1b1b;
  color:white;
  cursor:pointer;
}

/* Medical Decor */
body::before{
  content:"";
  position:fixed;
  width:260px;
  height:260px;
  background:radial-gradient(circle,#2f855a22,transparent);
  top:10%;
  left:5%;
  border-radius:50%;
  z-index:-1;
}

/* ===== Footer Back Button ===== */
.footer{
  width:min(1200px,96vw);
  margin:16px auto 0;
  display:flex;
  justify-content:center;
}

.back-btn{
  border:none;
  cursor:pointer;
  padding:10px 18px;
  border-radius:14px;
  font-family:"Amiri",serif;
  font-weight:700;
  font-size:18px;
  background:linear-gradient(145deg,#c9f0ff,#d4f5e1);
  box-shadow:
    0 16px 34px rgba(0,0,0,.18),
    inset 2px 2px 10px rgba(255,255,255,.75),
    inset -2px -2px 12px rgba(0,0,0,.10);
}
.back-btn:active{filter:brightness(.98);}

/* =========================
   Mobile only (<= 600px)
   نقاط 1 و2
========================= */
@media (max-width: 600px){

  /* (1) أحجام العناصر: مساحات وهوامش للهاتف */
  body{
    padding:12px;
  }

  .topbar{
    padding:14px 12px;
    border-radius:16px;
    margin-bottom:12px;
    font-size:20px;   /* كان 34px -> تقريبًا -40% */
  }

  .tip{
    padding:8px 10px;
    border-radius:12px;
    margin-bottom:14px;
    font-size:14px;
    line-height:1.5;
  }

  .viewer-container{
    border-radius:16px;
    padding:10px;
  }

  .toolbar{
    gap:8px;
    padding:6px 8px;
    border-radius:10px;
    font-size:14px;
  }

  /* (2) تصغير كلمة الترحيب بنسبة 40% (هاتف فقط) */
  .welcome{
    font-size:11px;   /* كان 18px -> تقريبًا -40% */
    top:10px;
    right:12px;
  }

  /* تحسين مناسب لأزرار الحروف على الهاتف (ضمن بند 1: أحجام العناصر) */
  .alphabet{
    gap:6px;
    margin-bottom:12px;
  }

  .alphabet button{
    padding:7px 10px;
    font-size:15px;
    border-radius:22px;
  }
  /* إبراز الحرف المختار - هاتف فقط */
.alphabet button.active{
  background:linear-gradient(145deg,#2f855a,#38a169);
  color:#fff;
  transform:scale(1.08);
  box-shadow:
    0 8px 18px rgba(0,0,0,.25),
    inset 2px 2px 6px rgba(255,255,255,.15);
}
}
</style>
</head>

<body>

<div class="topbar">
  <div class="welcome">مرحبا بك ..</div>
  المسرد العربي
</div>

<div class="alphabet" id="alphabet"></div>

<div class="tip">اضغط على الحرف لعرض صفحاته في الكتاب.</div>

<div class="viewer-container">

  <div class="toolbar">
    <button type="button" onclick="zoomIn()">+</button>
    <button type="button" onclick="zoomOut()">-</button>
    <span>صفحة: <span id="page-num"></span></span>
  </div>

  <div class="book" id="book">
    <iframe class="pdf-page" id="pdfFrame" src="about:blank"></iframe>
  </div>

  <div class="side-right">
    <button type="button" onclick="nextPage()">›</button>
    <button type="button" onclick="prevPage()">‹</button>
    <button type="button" onclick="firstPage()">↺</button>
  </div>

  <div class="side-left">
    <button type="button" onclick="zoomIn()">+</button>
    <button type="button" onclick="zoomOut()">-</button>
  </div>

</div>

<footer class="footer">
  <button class="back-btn" type="button" onclick="location.href='index.html'">الرجوع إلى الصفحة الرئيسية</button>
</footer>

<script>
/* ✅ ملف PDF */
const PDF_FILE = "source.pdf";

/* ✅ لأن ترقيم الكتاب = ترقيم الـPDF نفسه */
const START_PRINTED_PAGE = 1;

const letters = ["ا","ب","ت","ث","ج","ح","خ","د","ذ","ر","ز","س","ش","ص","ض","ط","ظ","ع","غ","ف","ق","ك","ل","م","ن","هـ","و","ي"];
const alphabetDiv = document.getElementById("alphabet");
const pdfFrame = document.getElementById("pdfFrame");
const pageNumEl = document.getElementById("page-num");

letters.forEach(letter=>{
  const btn = document.createElement("button");
  btn.textContent = letter;
  btn.onclick = ()=>selectLetter(letter, btn);
  alphabetDiv.appendChild(btn);
});

let pageNum = 1;   // صفحة واحدة
let zoomPct = 110; // تكبير افتراضي (٪)

function printedToInternal(printedPage){
  return (printedPage - START_PRINTED_PAGE) + 1; // هنا = نفس الرقم
}

function loadPage(page){
  if(!page || page < 1) page = 1;

  pageNum = page;
  pageNumEl.textContent = pageNum;

  pdfFrame.src = `${PDF_FILE}#page=${pageNum}&zoom=${zoomPct}`;
}

function nextPage(){
  loadPage(pageNum + 1);
}

function prevPage(){
  loadPage(pageNum - 1);
}

function firstPage(){
  loadPage(1);
}

function zoomIn(){
  zoomPct += 10;
  if(zoomPct > 250) zoomPct = 250;
  loadPage(pageNum);
}

function zoomOut(){
  zoomPct -= 10;
  if(zoomPct < 50) zoomPct = 50;
  loadPage(pageNum);
}

function selectLetter(letter, btn){
  document.querySelectorAll(".alphabet button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  const letterMapPrinted = {
    "ا": 333,
    "ب": 356,
    "ت": 364,
    "ث": 373,
    "ج": 375,
    "ح": 377,
    "خ": 381,
    "د": 383,
    "ذ": 386,
    "ر": 387,
    "ز": 389,
    "س": 389,
    "ش": 394,
    "ص": 396,
    "ض": 397,
    "ط": 398,
    "ع": 400,
    "غ": 403,
    "ف": 405,
    "ق": 408,
    "ك": 412,
    "ل": 417,
    "م": 420,
    "ن": 449,
    "هـ": 452,
    "و": 454,
    "ي": 456
  };

  const printed = letterMapPrinted[letter];
  if(!printed) return;

  loadPage(printedToInternal(printed));
}

/* بدء */
loadPage(333);
</script>

</body>
</html>
